---
- name: Ensure ansible_facts used by role
  setup:
    gather_subset: "{{ __journald_required_facts_subsets }}"
  when: __journald_required_facts |
    difference(ansible_facts.keys() | list) | length > 0

- name: Record role begin fingerprint
  sr_fingerprint:
    sr_message: >-
      begin system_role:journald ansible_version={{ ansible_version.full }}
      {{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}

- name: Determine if system is ostree and set flag
  when: not __journald_is_ostree is defined
  block:
    - name: Check if system is ostree
      stat:
        path: /run/ostree-booted
      register: __ostree_booted_stat

    - name: Set flag to indicate system is ostree
      set_fact:
        __journald_is_ostree: "{{ __ostree_booted_stat.stat.exists }}"
